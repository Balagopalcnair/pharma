<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Store</title>
<link rel="stylesheet" href="../css/style.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef4ff,#f8fbff);
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#2E86DE;
color:white;
}

.nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

/* TITLE */

.store-title{
text-align:center;
margin-top:30px;
font-size:32px;
color:#333;
}

/* SEARCH */

.search{
display:block;
margin:25px auto;
padding:12px;
width:300px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

/* PRODUCT GRID */

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
max-width:1100px;
margin:auto;
}

/* PRODUCT CARD */

.product-card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
text-align:center;
transition:0.3s;
}

.product-card img{
width:100%;
height:160px;
object-fit:cover;
}

.product-card h3{
margin:12px 0 6px;
font-size:18px;
}

.price{
color:#2E86DE;
font-weight:bold;
margin-bottom:10px;
}

/* BUTTON */

.product-card button{
background:#2E86DE;
border:none;
color:white;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
margin-bottom:15px;
font-weight:bold;
}

.product-card button:hover{
background:#1f6fd1;
}

/* HOVER EFFECT */

.product-card:hover{
transform:translateY(-6px);
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* CART POPUP */

#cartPopup{
position:fixed;
bottom:20px;
right:20px;
background:#2ecc71;
color:white;
padding:12px 18px;
border-radius:8px;
opacity:0;
transform:translateY(20px);
transition:0.4s;
font-weight:bold;
}

#cartPopup.show{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<nav class="nav">
<div><b>MediNova</b></div>

<div>
<a href="dashboard.html">Home</a>
<a href="store.html">Products</a>
</div>
</nav>

<h1 class="store-title">Pharmacy Store</h1>

<input id="search" class="search" placeholder="Search medicine..." onkeyup="filterProducts()">

<div class="product-grid" id="products"></div>

<div id="cartPopup">Added to cart ✔</div>

<script src="../js/store.js"></script>

</body>
</html>
